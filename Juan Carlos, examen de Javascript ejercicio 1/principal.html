<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Consumo Eléctrico</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Calculadora de IMC</h1>
            <div class="help-button" id="helpBtn">?
                <div class="help-tooltip" id="helpTooltip">
                    <p>Esta aplicación calcula el IMC introduce tu Peso en Kg y Estatura en metros (Ej: Peso(kg): 90, Estatura(m): 1.80).</p>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="form-group">
                <label for="peso">Peso (en Kg):</label>
                <input type="number" id="peso" placeholder="Ej: 90">
            </div>

            <div class="form-group">
                <label for="estatura">Estatura (en metros):</label>
                <input type="number" id="estatura" placeholder="Ej: 1.80">
            </div>

            <div class="results">
                <div class="result-item">
                    <label>IMC:</label>
                    <div id="imc" class="result-value">0.00</div>
            </div>

            <div class="buttons">
                <button onclick="calcularImc()" class="btn-calc">Calcular IMC</button>
                <button type="reset" class="btn-calc">Borrar</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
