<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Máquina de pago automática</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<h2>Máquina de pago</h2>

<label for="importe">Importe a pagar (€)</label>
<input type="number" id="importe" min="0" step="0.01">

<label for="pagado">Cantidad pagada (€)</label>
<input type="number" id="pagado" readonly>

<label for="cambio">Cambio (€)</label>
<input type="number" id="cambio" readonly>

<h3>Monedas</h3>
<div class="monedas">
  <div class="moneda" data-valor="0.20">20c</div>
  <div class="moneda" data-valor="0.50">50c</div>
  <div class="moneda" data-valor="1">1€</div>
</div>

<h3>Billetes</h3>
<div class="billetes">
  <div class="billete" data-valor="5">5€</div>
  <div class="billete" data-valor="10">10€</div>
  <div class="billete" data-valor="20">20€</div>
</div>

<button id="reset">Reset</button>

<script src="script.js"></script>
</body>
</html>
